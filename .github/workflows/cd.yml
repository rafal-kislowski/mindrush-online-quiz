name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mindrush-online-quiz-backend
  FRONTEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mindrush-online-quiz-frontend

jobs:
  deploy:
    name: Build images and deploy to VPS
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mindrush-online-quiz-backend:${{ github.event.workflow_run.head_sha }}
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mindrush-online-quiz-frontend:${{ github.event.workflow_run.head_sha }}
      DEMO_APP_DIR: ${{ secrets.VPS_DEMO_APP_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.vps.yml,deploy/vps/remote-deploy.sh,.env.example,.env.demo.example
          target: ${{ secrets.VPS_APP_DIR }}
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          COMPOSE_FILE: docker-compose.vps.yml
          ENV_FILE: .env
          DEPLOY_ENV_FILE: .env.deploy
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR,COMPOSE_FILE,ENV_FILE,DEPLOY_ENV_FILE,BACKEND_IMAGE,FRONTEND_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            chmod +x "${APP_DIR}/deploy/vps/remote-deploy.sh"
            bash "${APP_DIR}/deploy/vps/remote-deploy.sh"

      - name: Copy deployment files to demo VPS directory
        if: ${{ env.DEMO_APP_DIR != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.vps.yml,deploy/vps/remote-deploy.sh,.env.example,.env.demo.example
          target: ${{ env.DEMO_APP_DIR }}
          overwrite: true

      - name: Deploy demo on VPS
        if: ${{ env.DEMO_APP_DIR != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.DEMO_APP_DIR }}
          COMPOSE_FILE: docker-compose.vps.yml
          ENV_FILE: .env
          DEPLOY_ENV_FILE: .env.deploy
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR,COMPOSE_FILE,ENV_FILE,DEPLOY_ENV_FILE,BACKEND_IMAGE,FRONTEND_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            chmod +x "${APP_DIR}/deploy/vps/remote-deploy.sh"
            bash "${APP_DIR}/deploy/vps/remote-deploy.sh"
