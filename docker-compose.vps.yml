services:
  mysql:
    image: mysql:8.4
    container_name: mindrush-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mindrush}
      MYSQL_USER: ${MYSQL_USER:-mindrush}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mindrush}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mindrush_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: mindrush-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-mindrush}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-mindrush}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-mindrush}
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      APP_MEDIA_DIR: /app/uploads
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@mindrush.local}
      APP_MAIL_SUPPORT: ${APP_MAIL_SUPPORT:-support@mindrush.local}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "8080"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: mindrush-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - default
      - proxy

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mindrush-phpmyadmin
    profiles:
      - tools
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"

volumes:
  mindrush_mysql_data:
  backend_uploads:

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-portfolio_default}
