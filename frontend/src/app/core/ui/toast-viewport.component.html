<section class="toast-viewport" aria-live="polite" aria-relevant="additions text">
  <article
    class="toast"
    *ngFor="let toast of toasts$ | async; trackBy: trackByToastId"
    [class.toast--info]="toast.tone === 'info'"
    [class.toast--success]="toast.tone === 'success'"
    [class.toast--warning]="toast.tone === 'warning'"
    [class.toast--error]="toast.tone === 'error'"
    [class.is-leaving]="toast.leaving"
    [attr.role]="toast.tone === 'error' || toast.tone === 'warning' ? 'alert' : 'status'"
  >
    <span class="toast__accent" aria-hidden="true"></span>

    <div class="toast__content">
      <p class="toast__title">{{ toast.title }}</p>
      <p class="toast__message">{{ toast.message }}</p>
    </div>

    <button
      type="button"
      class="toast__close"
      (click)="dismiss(toast.id)"
      aria-label="Dismiss notification"
    >
      &times;
    </button>
  </article>
</section>
