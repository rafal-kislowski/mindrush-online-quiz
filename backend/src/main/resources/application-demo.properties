# Public demo profile
app.seed.enabled=true
app.mail.enabled=false
app.openai.enabled=false
app.auth.require-verified-email=false
app.bootstrap.admin.email=
app.bootstrap.admin.password=

app.demo.enabled=true
app.demo.banner.label=${APP_DEMO_BANNER_LABEL:Public demo}
app.demo.banner.message=${APP_DEMO_BANNER_MESSAGE:Demo data resets daily. Selected leaderboard entries and lobby activity are simulated.}
app.demo.reset.on-startup=${APP_DEMO_RESET_ON_STARTUP:true}
app.demo.reset.scheduled=${APP_DEMO_RESET_SCHEDULED:true}
app.demo.reset.cron=${APP_DEMO_RESET_CRON:0 0 4 * * *}
app.demo.reset.zone=${APP_DEMO_RESET_ZONE:Europe/Warsaw}
app.demo.bootstrap.authenticated-users=${APP_DEMO_AUTH_USERS:36}
app.demo.bootstrap.guest-bots=${APP_DEMO_GUEST_BOTS:9}
app.demo.bootstrap.historical-matches=${APP_DEMO_HISTORICAL_MATCHES:24}
app.demo.simulation.enabled=${APP_DEMO_SIMULATION_ENABLED:true}
app.demo.simulation.fixed-delay-ms=${APP_DEMO_SIMULATION_DELAY_MS:20000}
app.demo.simulation.initial-delay-ms=${APP_DEMO_SIMULATION_INITIAL_DELAY_MS:12000}
app.demo.simulation.session-ttl=${APP_DEMO_SESSION_TTL:PT12H}
app.demo.simulation.open-authenticated-lobbies=${APP_DEMO_OPEN_AUTH_LOBBIES:6}
app.demo.simulation.open-guest-lobbies=${APP_DEMO_OPEN_GUEST_LOBBIES:4}
app.demo.simulation.in-game-lobbies=${APP_DEMO_IN_GAME_LOBBIES:2}
app.demo.simulation.authenticated-lobby-pool-size=${APP_DEMO_AUTH_POOL_SIZE:4}
app.demo.simulation.guest-lobby-pool-size=${APP_DEMO_GUEST_POOL_SIZE:2}
