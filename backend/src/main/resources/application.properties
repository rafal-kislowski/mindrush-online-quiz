spring.application.name=backend

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

app.seed.enabled=true

# Auth (JWT cookies)
app.jwt.secret=${JWT_SECRET:dev-secret-change-me}
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P14D
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

# Bootstrap admin (set in local env / application-local.properties)
app.bootstrap.admin.email=${ADMIN_EMAIL:}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}
