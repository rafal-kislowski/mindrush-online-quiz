spring.application.name=backend

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

app.seed.enabled=true

# Library quiz policy (USER / PREMIUM tiers)
app.library.policy.user.max-owned-quizzes=20
app.library.policy.user.max-published-quizzes=5
app.library.policy.user.max-pending-submissions=3
app.library.policy.user.min-questions-to-submit=5
app.library.policy.user.max-questions-per-quiz=50
app.library.policy.user.max-question-images-per-quiz=10
app.library.policy.user.min-question-time-limit-seconds=5
app.library.policy.user.max-question-time-limit-seconds=180
app.library.policy.user.max-questions-per-game=50
app.library.policy.premium.max-owned-quizzes=60
app.library.policy.premium.max-published-quizzes=20
app.library.policy.premium.max-pending-submissions=10
app.library.policy.premium.min-questions-to-submit=5
app.library.policy.premium.max-questions-per-quiz=100
app.library.policy.premium.max-question-images-per-quiz=100
app.library.policy.premium.min-question-time-limit-seconds=5
app.library.policy.premium.max-question-time-limit-seconds=300
app.library.policy.premium.max-questions-per-game=100
app.library.policy.media.max-upload-bytes=2097152
app.library.policy.media.allowed-mime-types[0]=image/jpeg
app.library.policy.media.allowed-mime-types[1]=image/png
app.library.policy.media.allowed-mime-types[2]=image/webp
app.library.policy.media.allowed-mime-types[3]=image/gif

# Auth (JWT cookies)
app.jwt.secret=${JWT_SECRET:dev-secret-change-me}
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P14D
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.auth.require-verified-email=${APP_AUTH_REQUIRE_VERIFIED_EMAIL:true}

# Transactional email (verification + password reset)
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@mindrush.local}
app.mail.support-email=${APP_MAIL_SUPPORT:support@mindrush.local}
app.mail.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}
app.mail.verify-path=/verify-email
app.mail.reset-path=/reset-password
app.mail.verify-ttl=PT24H
app.mail.reset-ttl=PT30M
app.mail.verify-resend-cooldown=${APP_MAIL_VERIFY_RESEND_COOLDOWN:PT2M}
app.mail.reset-request-cooldown=${APP_MAIL_RESET_REQUEST_COOLDOWN:PT2M}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# Bootstrap admin (set in local env / application-local.properties)
app.bootstrap.admin.email=${ADMIN_EMAIL:}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}

# Lobby presence/background-tab tolerance.
# Chrome can heavily throttle background tabs, so 25s was too aggressive.
lobby.presence.timeout=PT15M
lobby.presence.reconnect-grace=PT45S
lobby.presence.reconnect-grace.cleanup.fixedDelayMs=2000
lobby.empty.ttl=PT10M

# Training solo/lobby sessions are auto-finished after inactivity.
game.training.inactivity-timeout=PT2H
