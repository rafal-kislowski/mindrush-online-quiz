spring.application.name=backend

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.enabled=${APP_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${APP_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration

app.seed.enabled=true

# Library quiz policy (USER / PREMIUM tiers)
app.library.policy.user.max-owned-quizzes=20
app.library.policy.user.max-published-quizzes=5
app.library.policy.user.max-pending-submissions=3
app.library.policy.user.min-questions-to-submit=5
app.library.policy.user.max-questions-per-quiz=50
app.library.policy.user.max-question-images-per-quiz=10
app.library.policy.user.min-question-time-limit-seconds=5
app.library.policy.user.max-question-time-limit-seconds=180
app.library.policy.user.max-questions-per-game=50
app.library.policy.premium.max-owned-quizzes=60
app.library.policy.premium.max-published-quizzes=20
app.library.policy.premium.max-pending-submissions=10
app.library.policy.premium.min-questions-to-submit=5
app.library.policy.premium.max-questions-per-quiz=100
app.library.policy.premium.max-question-images-per-quiz=100
app.library.policy.premium.min-question-time-limit-seconds=5
app.library.policy.premium.max-question-time-limit-seconds=300
app.library.policy.premium.max-questions-per-game=100
app.library.policy.media.max-upload-bytes=2097152
app.library.policy.media.allowed-mime-types[0]=image/jpeg
app.library.policy.media.allowed-mime-types[1]=image/png
app.library.policy.media.allowed-mime-types[2]=image/webp
app.library.policy.media.allowed-mime-types[3]=image/gif

# Multipart upload limits (also used by AI source-file question generation).
spring.servlet.multipart.max-file-size=${APP_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MULTIPART_MAX_REQUEST_SIZE:22MB}

# Auth (JWT cookies)
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P14D
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.auth.require-verified-email=${APP_AUTH_REQUIRE_VERIFIED_EMAIL:true}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Transactional email (verification + password reset)
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@mindrush.local}
app.mail.support-email=${APP_MAIL_SUPPORT:support@mindrush.local}
app.mail.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}
app.mail.verify-path=/verify-email
app.mail.reset-path=/reset-password
app.mail.verify-ttl=PT24H
app.mail.reset-ttl=PT30M
app.mail.verify-resend-cooldown=${APP_MAIL_VERIFY_RESEND_COOLDOWN:PT2M}
app.mail.reset-request-cooldown=${APP_MAIL_RESET_REQUEST_COOLDOWN:PT2M}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# Shop / premium checkout
app.shop.payment-provider=${APP_SHOP_PAYMENT_PROVIDER:SIMULATED}
app.shop.premium-expiration-check-ms=${APP_SHOP_PREMIUM_EXPIRATION_CHECK_MS:60000}
app.shop.payu.sandbox-enabled=${APP_SHOP_PAYU_SANDBOX_ENABLED:false}
app.shop.payu.client-id=${APP_SHOP_PAYU_CLIENT_ID:}
app.shop.payu.client-secret=${APP_SHOP_PAYU_CLIENT_SECRET:}
app.shop.payu.merchant-pos-id=${APP_SHOP_PAYU_MERCHANT_POS_ID:}
app.shop.payu.notify-url=${APP_SHOP_PAYU_NOTIFY_URL:}
app.shop.payu.continue-url=${APP_SHOP_PAYU_CONTINUE_URL:}
app.shop.pricing-currencies[0].code=${APP_SHOP_CURRENCY_0_CODE:PLN}
app.shop.pricing-currencies[0].label=${APP_SHOP_CURRENCY_0_LABEL:Polish zloty}
app.shop.pricing-currencies[0].type=${APP_SHOP_CURRENCY_0_TYPE:FIAT}
app.shop.pricing-currencies[0].fraction-digits=${APP_SHOP_CURRENCY_0_FRACTION:2}
app.shop.pricing-currencies[1].code=${APP_SHOP_CURRENCY_1_CODE:EUR}
app.shop.pricing-currencies[1].label=${APP_SHOP_CURRENCY_1_LABEL:Euro}
app.shop.pricing-currencies[1].type=${APP_SHOP_CURRENCY_1_TYPE:FIAT}
app.shop.pricing-currencies[1].fraction-digits=${APP_SHOP_CURRENCY_1_FRACTION:2}
app.shop.pricing-currencies[2].code=${APP_SHOP_CURRENCY_2_CODE:USD}
app.shop.pricing-currencies[2].label=${APP_SHOP_CURRENCY_2_LABEL:US dollar}
app.shop.pricing-currencies[2].type=${APP_SHOP_CURRENCY_2_TYPE:FIAT}
app.shop.pricing-currencies[2].fraction-digits=${APP_SHOP_CURRENCY_2_FRACTION:2}
app.shop.pricing-currencies[3].code=${APP_SHOP_CURRENCY_3_CODE:COINS}
app.shop.pricing-currencies[3].label=${APP_SHOP_CURRENCY_3_LABEL:Coins}
app.shop.pricing-currencies[3].type=${APP_SHOP_CURRENCY_3_TYPE:GAME}
app.shop.pricing-currencies[3].fraction-digits=${APP_SHOP_CURRENCY_3_FRACTION:0}

# Bootstrap admin (set in local env / application-local.properties)
app.bootstrap.admin.email=${ADMIN_EMAIL:}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}

# OpenAI question generation for admin quiz builder.
app.openai.enabled=${OPENAI_ENABLED:false}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.openai.timeout=${OPENAI_TIMEOUT:PT90S}
app.openai.max-questions-per-request=${OPENAI_MAX_QUESTIONS_PER_REQUEST:500}
app.openai.temperature=${OPENAI_TEMPERATURE:0.4}

# Public demo profile.
app.demo.enabled=${APP_DEMO_ENABLED:false}

# Lobby presence/background-tab tolerance.
# Chrome can heavily throttle background tabs, so 25s was too aggressive.
lobby.presence.timeout=PT15M
lobby.presence.reconnect-grace=PT45S
lobby.presence.reconnect-grace.cleanup.fixedDelayMs=2000
lobby.empty.ttl=PT10M

# Training solo/lobby sessions are auto-finished after inactivity.
game.training.inactivity-timeout=PT2H
